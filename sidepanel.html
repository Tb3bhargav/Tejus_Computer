<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tejus Computer Agent</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header>
      <div class="logo">
        <img src="icons/icon48.png" alt="logo" width="22" height="22" />
        <span class="logo-text">Tejus Computer</span>
      </div>
      <span class="status-badge" id="status-badge">Idle</span>
    </header>

    <!-- Settings -->
    <section class="panel" id="settings-panel">
      <div class="form-group">
        <label for="api-key">Groq API Key</label>
        <div class="input-row">
          <input type="password" id="api-key" placeholder="gsk_..." autocomplete="off" spellcheck="false" />
          <button class="icon-btn" id="toggle-key" title="Show/hide key">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label for="model">Vision Model</label>
        <div class="input-row">
          <select id="model">
            <option value="llama-3.2-90b-vision-preview">Llama 3.2 90B Vision (Recommended)</option>
            <option value="llama-3.2-11b-vision-preview">Llama 3.2 11B Vision (Faster)</option>
            <option value="custom">Custom model…</option>
          </select>
        </div>
        <input type="text" id="custom-model" placeholder="e.g. meta-llama/llama-4-scout-17b-16e-instruct"
               style="display:none; margin-top:6px" />
      </div>
    </section>

    <!-- Task input -->
    <section class="panel task-panel">
      <div class="form-group">
        <label for="task">Task</label>
        <textarea id="task" rows="3"
          placeholder="Describe what you want the agent to do, e.g. 'Search for the weather in London and tell me the result'"></textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="start-btn">▶ Start Agent</button>
        <button class="btn btn-danger" id="stop-btn" disabled>⏹ Stop</button>
      </div>
    </section>

    <!-- Live screenshot preview -->
    <section class="panel screenshot-panel" id="screenshot-panel" style="display:none">
      <div class="panel-header">
        <span>Current View</span>
        <span class="step-counter" id="step-counter"></span>
      </div>
      <img id="screenshot-img" src="" alt="Current screenshot" />
    </section>

    <!-- Activity log -->
    <section class="panel activity-panel">
      <div class="panel-header">
        <span>Activity Log</span>
        <button class="text-btn" id="clear-log">Clear</button>
      </div>
      <div class="log-container" id="log-container">
        <div class="log-entry system">
          Welcome! Enter your Groq API key, choose a task, and click <strong>Start Agent</strong>.
        </div>
      </div>
    </section>

  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
